name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev libltdl-dev
      
      - name: Install Buildozer
        run: |
          pip3 install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=/home/runner/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          # Создаем структуру для Buildozer
          mkdir -p $ANDROID_SDK_ROOT/tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
      
      - name: Setup Android NDK
        run: |
          cd /home/runner
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          mv android-ndk-r25c android-ndk
          echo "ANDROID_NDK_HOME=/home/runner/android-ndk" >> $GITHUB_ENV
      
      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROID_NDK_HOME: /home/runner/android-ndk
        run: |
          export PATH=$PATH:/home/runner/android-sdk/cmdline-tools/latest/bin:/home/runner/android-sdk/tools/bin
          buildozer -v android debug
      
      - name: Find and Upload APK
        if: always()
        run: |
          echo "=== Searching for APK ==="
          find /home/runner -name "*.apk" -type f 2>/dev/null || true
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null || true
          mkdir -p $GITHUB_WORKSPACE/bin
          find /home/runner/.buildozer -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/bin/ \; 2>/dev/null || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk
          path: |
            bin/*.apk
            **/*.apk
